<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>img</title>
	<link rel="manifest" href="manifest.json" />
</head>

<body>
    <header>
        <div class="header_box">
            <h1>Курахский район 1</h1>
        </div>
    </header>
    <main>
        <div class="main_box">
            <div class="vk" data-link="https://vk.com/album-223669523_302265466"></div>
        </div>
    </main>

    <script src="js/jquery-3.2.1.min.js" integrity="sha256-hwg4gsxgFZhOsEEamdOYGBf13FyQuiTwlAQgxVSNgt4="
        crossorigin="anonymous"></script>
    <script src="js/jquery.embedvkgallery.js"></script>
    <script>
        (function ($) {
            $(function () {
                $('.vk').EmbedVkGallery();
            });
        })(jQuery);
    </script>
	<script type="module">

    import { Workbox } from './workbox-v4.3.0/workbox-window.prod.mjs';

    if ('serviceWorker' in navigator) {

        const wb = new Workbox('sw-workbox.js');

        wb.addEventListener('installed', event => {
            if (event.isUpdate) {
                if (confirm(`Мы только что обновили версию приложения! Чтобы получить обновления, нажмите на кнопку OK.`)) {
                    window.location.reload();
                } else {
                    alert(`Вы отказались от обновления приложения. Для получения новых возможностей перезагрузите страницу в будущем.`);
                }
            } else {
                alert(`Приложение готово к работе в автономном режиме`);
            }
        });

        wb.register();
    }

</script>

</body>

</html>
