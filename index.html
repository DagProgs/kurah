<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prayer Time Notifications</title>
  <link rel="manifest" href="manifest.json" />
  <script
    async
    src="https://cdn.jsdelivr.net/npm/pwacompat@2.0.8/pwacompat.min.js"
    integrity="sha384-uONtBTCBzHKF84F6XvyC8S0gL8HTkAPeCyBNvfLfsqHh+Kd6s/kaS4BdmNQ5ktp1"
    crossorigin="anonymous"
  ></script>
</head>
<body>
<h1>dfdfdf</h1>


<script>
  const prayerTimes = {
    "1": {
      "1": {
        "Fajr": [4, 30],
        "Sunrise": [6, 0],
        "Dhuhr": [12, 0],
        "Asr": [15, 0],
        "Maghrib": [18, 0],
        "Isha": [19, 30]
      },
      "2": {
        "Fajr": [4, 30],
        "Sunrise": [6, 0],
        "Dhuhr": [12, 0],
        "Asr": [15, 0],
        "Maghrib": [18, 0],
        "Isha": [19, 30]
      }
    },
    "2": {
      "1": {
        "Fajr": [4, 30],
        "Sunrise": [6, 0],
        "Dhuhr": [12, 0],
        "Asr": [15, 0],
        "Maghrib": [18, 0],
        "Isha": [19, 30]
      },
      "28": {
        "Fajr": [4, 30],
        "Sunrise": [6, 0],
        "Dhuhr": [10, 41],
        "Asr": [15, 0],
        "Maghrib": [18, 0],
        "Isha": [19, 30]
      }
    }
  };

  function checkPrayerTime() {
    const today = new Date();
    const dayOfMonth = today.getDate().toString();
    const month = (today.getMonth() + 1).toString();

    const times = prayerTimes[month] && prayerTimes[month][dayOfMonth];

    if (times) {
      const currentTime = [today.getHours(), today.getMinutes()];

      for (const prayer in times) {
        const prayerTime = times[prayer];
        if (currentTime[0] === prayerTime[0] && currentTime[1] === prayerTime[1]) {
          showNotification(`Time for ${prayer}`, `It's time for ${prayer} prayer.`);
        }
      }
    }
  }

  function showNotification(title, body) {
    if (Notification.permission === 'granted') {
      const notification = new Notification(title, {
        body: body,
        icon: 'path/to/icon.png'
      });
    }
  }

  Notification.requestPermission().then((permission) => {
    if (permission === 'granted') {
      setInterval(checkPrayerTime, 60000);
    }
  });
</script>


<script type="text/javascript" src="runtime.js"></script>
  <script type="text/javascript" src="polyfills.js"></script>
  <script type="text/javascript" src="main.js"></script>

  <script type="module">
    import {Workbox} from 'https://storage.googleapis.com/workbox-cdn/releases/4.3.0/workbox-window.prod.mjs';
    
    if ('serviceWorker' in navigator) {
      const wb = new Workbox('/sw-workbox.js');
      wb.addEventListener('installed', event => {
        if (event.isUpdate) {
          if (confirm(`New content is available! Click OK to refresh`)) {
            window.location.reload();
          }
        } else {
          alert(`The app is offline-ready`);
        }
      });
    
      wb.register();
    }
  </script>
</body>
</html>
