<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prayer Time Notifications</title>
  <script src="jquery-3.6.0.min.js"></script>
  <link rel="manifest" href="manifest.json" />
  
  <script
    async
    src="https://cdn.jsdelivr.net/npm/pwacompat@2.0.8/pwacompat.min.js"
    integrity="sha384-uONtBTCBzHKF84F6XvyC8S0gL8HTkAPeCyBNvfLfsqHh+Kd6s/kaS4BdmNQ5ktp1"
    crossorigin="anonymous"
  ></script>
  <style>
    body {
      /* height: 200vh; */
    }
  </style>
</head>
<body>
  <h1>Test</h1>
  <p>Уведомления</p>
  <p>Уведомления</p>
  <h1>Test</h1>
  <p>Уведомления</p>
  <p>Уведваомления</p>
  <script>
    // Check for notification support and request permission
    if ('Notification' in window) {
      Notification.requestPermission().then(permission => {
        if (permission === 'granted') {
          setInterval(checkPrayerTime, 60000);
        } else if (permission === 'denied') {
          console.warn('Permission for notifications denied by user');
        } else {
          console.error('Error occurred while requesting permission');
        }
      }).catch(err => {
        console.error('Error occurred while requesting permission:', err);
      });
    } else {
      console.error('Notifications not supported in this browser');
    }

    const prayerTimes = {
      "2": {
        "1": {
          "Fajr": [5, 39],
          "Sunrise": [8, 5],
          "Dhuhr": [11, 58],
          "Asr": [14, 12],
          "Maghrib": [16, 36],
          "Isha": [17, 52]
        },
        "28": {
          "Fajr": [8, 56],
          "Sunrise": [9, 0],
          "Dhuhr": [9, 2],
          "Asr": [9, 5],
          "Maghrib": [9, 7],
          "Isha": [9, 10]
        }
      }
    };

    function checkPrayerTime() {
      const today = new Date();
      const dayOfMonth = today.getDate().toString();
      const month = (today.getMonth() + 1).toString();

      const times = prayerTimes[month] && prayerTimes[month][dayOfMonth];

      if (times) {
        const currentTime = [today.getHours(), today.getMinutes()];

        for (const prayer in times) {
          const prayerTime = times[prayer];
          if (currentTime[0] === prayerTime[0] && currentTime[1] === prayerTime[1]) {
            const notification = new Notification(`Time for ${prayer}`, {
              body: `It's time for ${prayer} prayer.`,
              icon: 'assets/icons/icon-192x192.png'
            });
          }
        }
      }
    }
  </script>
  <script type="text/javascript" src="runtime.js"></script>
  <script type="text/javascript" src="polyfills.js"></script>
  <script type="text/javascript" src="main.js"></script>
  
  <script type="module">

import {Workbox} from 'https://storage.googleapis.com/workbox-cdn/releases/4.3.0/workbox-window.prod.mjs';

if ('serviceWorker' in navigator) {

  const wb = new Workbox('sw-workbox.js');

  wb.addEventListener('installed', event => {
    if (event.isUpdate) {
      if (confirm(`New content is available!. Click OK to refresh`)) {
        window.location.reload();
      }
    } else {
        alert(`The app is offline-ready`)
    }
  });

  wb.register();
}

  </script>
</body>
</html>
