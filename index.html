<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="manifest" href="manifest.json" />
	<script
      async
      src="https://cdn.jsdelivr.net/npm/pwacompat@2.0.8/pwacompat.min.js"
      integrity="sha384-uONtBTCBzHKF84F6XvyC8S0gL8HTkAPeCyBNvfLfsqHh+Kd6s/kaS4BdmNQ5ktp1"
      crossorigin="anonymous"
    ></script>
    <style>
        .tooltip {
  position: relative;
  display: inline-block;
}

.tooltip .tooltiptext {
  visibility: hidden;
  width: 120px;
  background-color: #555;
  color: #fff;
  text-align: center;
  border-radius: 6px;
  padding: 5px;
  position: absolute;
  z-index: 1;
  bottom: 125%;
  left: 50%;
  margin-left: -60px;
  opacity: 0;
  transition: opacity 0.3s;
}

.tooltip:hover .tooltiptext {
  visibility: visible;
  opacity: 1;
}
    </style>
</head>
<body>
    <h1>Test</h1>
    <div id="tooltip" class="tooltip">
        <span class="tooltiptext">Нажмите "Поделиться" и выберите "Добавить на главный экран"</span>
      </div>





    <button id="shareBtn">Поделиться</button>
    
    <script type="text/javascript" src="runtime.js"></script><script type="text/javascript" src="polyfills.js"></script><script type="text/javascript" src="main.js"></script>
    
   
    
    <script>
        // Проверяем, поддерживает ли браузер Web Share API
if (navigator.share) {
  // Получаем кнопку "Поделиться"
  const shareButton = document.getElementById('shareBtn');
  
  // Добавляем обработчик события для клика по кнопке
  shareButton.addEventListener('click', async () => {
    try {
      // Вызываем метод share(), который предоставляет браузеру информацию о том, что мы хотим поделиться
      await navigator.share({
        title: 'Заголовок для вашей записи', // Заголовок, который будет отображаться при публикации
        text: 'Текст для вашей записи', // Текст, который будет отображаться при публикации
        url: 'https://example.com' // URL, который будет отображаться при публикации
      });
    } catch (error) {
      console.error('Ошибка при попытке поделиться:', error);
    }
  });
} else {
  // Если браузер не поддерживает Web Share API, скрываем кнопку "Поделиться"
  document.getElementById('shareBtn').style.display = 'none';
}
    </script>




<script type="module">

    import {Workbox} from 'https://storage.googleapis.com/workbox-cdn/releases/4.3.0/workbox-window.prod.mjs';
    
    if ('serviceWorker' in navigator) {
    
      const wb = new Workbox('sw-workbox.js');
    
      wb.addEventListener('installed', event => {
        if (event.isUpdate) {
          if (confirm(`New content is available!. Click OK to refresh`)) {
            window.location.reload();
          }
        } else {
            alert(`The app is offline-ready`)
        }
      });
    
      wb.register();
    }
    
      </script>
</body>
</html>
