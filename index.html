<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>img</title>
	<link rel="manifest" href="manifest.json" />
    <script async src="https://cdn.jsdelivr.net/npm/pwacompat@2.0.8/pwacompat.min.js"
        integrity="sha384-uONtBTCBzHKF84F6XvyC8S0gL8HTkAPeCyBNvfLfsqHh+Kd6s/kaS4BdmNQ5ktp1"
        crossorigin="anonymous"></script>
</head>

<body>
    <header>
        <div class="header_box">
            <h1>Курахский район</h1>
        </div>
    </header>
    <main>
        <div class="main_box">
            <div class="vk" data-link="https://vk.com/album-223669523_302265466"></div>
        </div>
    </main>

    <script src="js/jquery-3.2.1.min.js" integrity="sha256-hwg4gsxgFZhOsEEamdOYGBf13FyQuiTwlAQgxVSNgt4="
        crossorigin="anonymous"></script>
    <script src="js/jquery.embedvkgallery.js"></script>
    <script>
        (function ($) {
            $(function () {
                $('.vk').EmbedVkGallery();
            });
        })(jQuery);
    </script>
	<script type="module">

        import { Workbox } from 'https://storage.googleapis.com/workbox-cdn/releases/4.3.0/workbox-window.prod.mjs';

        if ('serviceWorker' in navigator) {

            const wb = new Workbox('sw-workbox.js');

            wb.addEventListener('installed', event => {
                if (event.isUpdate) {
                    if (confirm(`Мы только что обновили версию приложения! Чтобы получить обновления, нажмите на кнопку OK.`)) {
                        window.location.reload();
                    }
                } else {
                    alert(`Приложение готово к работе в автономном режиме`)
                }
            });

            wb.register();
        }

    </script>
	<script type="text/javascript" src="runtime.js"></script>
    <script type="text/javascript" src="polyfills.js"></script>
    <script type="text/javascript" src="main.js"></script>
</body>

</html>
